<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>Claude JD Sender — Settings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #e8e8e8;
      padding: 24px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #e8725a, #c44a2e);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-icon svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
    }

    .header p {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    input[type="url"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #333;
      border-radius: 10px;
      background: #252525;
      color: #e8e8e8;
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="url"]:focus {
      border-color: #e8725a;
      box-shadow: 0 0 0 3px rgba(232, 114, 90, 0.15);
    }

    input[type="url"]::placeholder {
      color: #555;
    }

    .btn-save {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #e8725a, #c44a2e);
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-save:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(232, 114, 90, 0.4);
    }

    .btn-save:active {
      transform: translateY(0);
    }

    .status {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
      display: none;
      animation: fadeIn 0.2s ease;
    }

    .status.success {
      display: block;
      background: rgba(76, 175, 80, 0.15);
      color: #81c784;
      border: 1px solid rgba(76, 175, 80, 0.2);
    }

    .status.error {
      display: block;
      background: rgba(244, 67, 54, 0.15);
      color: #ef9a9a;
      border: 1px solid rgba(244, 67, 54, 0.2);
    }

    .current-url {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 8px;
      background: #222;
      border: 1px solid #2a2a2a;
    }

    .current-url .label {
      font-size: 10px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 4px;
    }

    .current-url .url {
      font-size: 12px;
      color: #e8725a;
      font-family: 'SF Mono', 'Fira Code', monospace;
      word-break: break-all;
    }

    .current-url .url.none {
      color: #555;
      font-style: italic;
    }

    .info {
      margin-top: 16px;
      font-size: 11px;
      color: #666;
      line-height: 1.5;
    }

    .btn-logs {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      border: 1px solid #333;
      border-radius: 10px;
      background: #252525;
      color: #aaa;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logs:hover {
      background: #303030;
      color: #e8e8e8;
      border-color: #555;
    }

    .log-area {
      display: none;
      margin-top: 12px;
      max-height: 200px;
      overflow-y: auto;
      padding: 10px;
      border-radius: 8px;
      background: #111;
      border: 1px solid #2a2a2a;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      color: #aaa;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .log-area.visible {
      display: block;
    }

    .log-area .log-empty {
      color: #555;
      font-style: italic;
    }

    .btn-clear-logs {
      margin-top: 6px;
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      background: #333;
      color: #888;
      font-size: 11px;
      cursor: pointer;
      display: none;
    }

    .btn-clear-logs.visible {
      display: inline-block;
    }

    .btn-clear-logs:hover {
      background: #444;
      color: #ccc;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
      </svg>
    </div>
    <div>
      <h1>Claude JD Sender</h1>
      <p>Auto-send job descriptions to Claude</p>
    </div>
  </div>

  <div class="form-group">
    <label for="claude-url">Claude Chat URL</label>
    <input type="url" id="claude-url" placeholder="https://claude.ai/chat/abc123..." spellcheck="false"
      autocomplete="off" />
  </div>

  <button class="btn-save" id="save-btn">Save Settings</button>

  <div class="status" id="status"></div>

  <div class="current-url">
    <div class="label">Currently Saved</div>
    <div class="url" id="current-url">Not configured</div>
  </div>

  <div class="info">
    Select 10+ lines of text on any job posting page and click the floating button to auto-send it to your Claude chat.
  </div>

  <button class="btn-logs" id="logs-btn">📋 View Logs</button>
  <div class="log-area" id="log-area"></div>
  <button class="btn-clear-logs" id="clear-logs-btn">Clear Logs</button>

  <script src="popup.js"></script>
</body>

</html>
